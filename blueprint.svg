<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#2a6090"/>
    </marker>
    <marker id="arrc" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#0090c0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#0b1520" rx="8"/>

  <!-- Column backgrounds -->
  <rect x="16" y="16" width="262" height="488" fill="#0e1c28" rx="5" stroke="#1e3a52" stroke-width="1"/>
  <rect x="319" y="16" width="262" height="488" fill="#0e1c28" rx="5" stroke="#1e3a52" stroke-width="1"/>
  <rect x="622" y="16" width="262" height="488" fill="#0e1c28" rx="5" stroke="#1e3a52" stroke-width="1"/>

  <!-- Column headers -->
  <rect x="16" y="16" width="262" height="44" fill="#0a2a40" rx="5"/>
  <rect x="16" y="44" width="262" height="16" fill="#0a2a40"/>
  <text x="147" y="40" text-anchor="middle" fill="#40a0d0" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="1">PLANNING</text>

  <rect x="319" y="16" width="262" height="44" fill="#0a2a40" rx="5"/>
  <rect x="319" y="44" width="262" height="16" fill="#0a2a40"/>
  <text x="450" y="40" text-anchor="middle" fill="#40a0d0" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="1">BUILDING</text>

  <rect x="622" y="16" width="262" height="44" fill="#0a2a40" rx="5"/>
  <rect x="622" y="44" width="262" height="16" fill="#0a2a40"/>
  <text x="753" y="40" text-anchor="middle" fill="#40a0d0" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="1">RUNTIME</text>

  <!-- ── PLANNING ── -->

  <rect x="30" y="76" width="234" height="76" fill="#0c1e2e" rx="4" stroke="#1e4a6a" stroke-width="1"/>
  <text x="147" y="97" text-anchor="middle" fill="#60b0e0" font-family="sans-serif" font-size="11" font-weight="bold">CLAUDE.md brief</text>
  <text x="147" y="118" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">Hackathon rubric loaded</text>
  <text x="147" y="136" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">into Claude's context first</text>

  <line x1="147" y1="152" x2="147" y2="170" stroke="#2a6090" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="30" y="172" width="234" height="86" fill="#0c1e2e" rx="4" stroke="#1e4a6a" stroke-width="1"/>
  <text x="147" y="193" text-anchor="middle" fill="#60b0e0" font-family="sans-serif" font-size="11" font-weight="bold">Plan iteration</text>
  <text x="147" y="214" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">LLM-PLAN1 → PLAN4</text>
  <text x="147" y="232" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">Claude pushes back,</text>
  <text x="147" y="250" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">refines, discards ideas</text>

  <line x1="147" y1="258" x2="147" y2="276" stroke="#2a6090" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="30" y="278" width="234" height="76" fill="#0c1e2e" rx="4" stroke="#1e4a6a" stroke-width="1"/>
  <text x="147" y="299" text-anchor="middle" fill="#60b0e0" font-family="sans-serif" font-size="11" font-weight="bold">Claude picks the best plan</text>
  <text x="147" y="320" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">All team plans compared.</text>
  <text x="147" y="338" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">Claude selects and explains.</text>

  <line x1="147" y1="354" x2="147" y2="372" stroke="#2a6090" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="30" y="374" width="234" height="86" fill="#0c1e2e" rx="4" stroke="#1e4a6a" stroke-width="1"/>
  <text x="147" y="395" text-anchor="middle" fill="#60b0e0" font-family="sans-serif" font-size="11" font-weight="bold">Per-person plan</text>
  <text x="147" y="416" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">Each team member selects</text>
  <text x="147" y="434" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">a role. Plan Mode writes</text>
  <text x="147" y="452" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">their individual spec.</text>

  <!-- ── BUILDING ── -->

  <rect x="333" y="76" width="234" height="106" fill="#0c1e2e" rx="4" stroke="#1e4a6a" stroke-width="1"/>
  <text x="450" y="97" text-anchor="middle" fill="#60b0e0" font-family="sans-serif" font-size="11" font-weight="bold">5 parallel Claude agents</text>
  <text x="450" y="118" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">One agent per layer</text>
  <rect x="343" y="128" width="100" height="22" fill="#0a2030" rx="3" stroke="#1e4060" stroke-width="0.8"/>
  <text x="393" y="143" text-anchor="middle" fill="#4090b8" font-family="monospace" font-size="9">Rust engine</text>
  <rect x="453" y="128" width="104" height="22" fill="#0a2030" rx="3" stroke="#1e4060" stroke-width="0.8"/>
  <text x="505" y="143" text-anchor="middle" fill="#4090b8" font-family="monospace" font-size="9">Eval generator</text>
  <rect x="343" y="154" width="74" height="22" fill="#0a2030" rx="3" stroke="#1e4060" stroke-width="0.8"/>
  <text x="380" y="169" text-anchor="middle" fill="#4090b8" font-family="monospace" font-size="9">Backend</text>
  <rect x="423" y="154" width="74" height="22" fill="#0a2030" rx="3" stroke="#1e4060" stroke-width="0.8"/>
  <text x="460" y="169" text-anchor="middle" fill="#4090b8" font-family="monospace" font-size="9">Frontend</text>
  <rect x="503" y="154" width="58" height="22" fill="#0a2030" rx="3" stroke="#1e4060" stroke-width="0.8"/>
  <text x="532" y="169" text-anchor="middle" fill="#4090b8" font-family="monospace" font-size="9">Tester</text>

  <line x1="450" y1="182" x2="450" y2="200" stroke="#2a6090" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="333" y="202" width="234" height="86" fill="#0c1e2e" rx="4" stroke="#1e4a6a" stroke-width="1"/>
  <text x="450" y="223" text-anchor="middle" fill="#60b0e0" font-family="sans-serif" font-size="11" font-weight="bold">Claude writes all the code</text>
  <text x="450" y="244" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">Every file committed was</text>
  <text x="450" y="262" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">written and reviewed</text>
  <text x="450" y="280" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">with Claude.</text>

  <line x1="450" y1="288" x2="450" y2="306" stroke="#2a6090" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="333" y="308" width="234" height="86" fill="#0c1e2e" rx="4" stroke="#1e4a6a" stroke-width="1"/>
  <text x="450" y="329" text-anchor="middle" fill="#60b0e0" font-family="sans-serif" font-size="11" font-weight="bold">Interface contract</text>
  <text x="450" y="350" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">Rust↔Python spec designed</text>
  <text x="450" y="368" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">with Claude, committed</text>
  <text x="450" y="386" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">before build started.</text>

  <!-- ── RUNTIME ── -->

  <rect x="636" y="76" width="234" height="76" fill="#061824" rx="4" stroke="#006688" stroke-width="1.5"/>
  <text x="753" y="97" text-anchor="middle" fill="#00c0f0" font-family="sans-serif" font-size="11" font-weight="bold">① Interpret</text>
  <text x="753" y="118" text-anchor="middle" fill="#3a90b0" font-family="sans-serif" font-size="10">Maps your description</text>
  <text x="753" y="136" text-anchor="middle" fill="#3a90b0" font-family="sans-serif" font-size="10">into chess concepts</text>

  <line x1="753" y1="152" x2="753" y2="170" stroke="#0090c0" stroke-width="1.5" marker-end="url(#arrc)"/>

  <rect x="636" y="172" width="234" height="76" fill="#061824" rx="4" stroke="#006688" stroke-width="1.5"/>
  <text x="753" y="193" text-anchor="middle" fill="#00c0f0" font-family="sans-serif" font-size="11" font-weight="bold">② Generate</text>
  <text x="753" y="214" text-anchor="middle" fill="#3a90b0" font-family="sans-serif" font-size="10">Writes a Python evaluate()</text>
  <text x="753" y="232" text-anchor="middle" fill="#3a90b0" font-family="sans-serif" font-size="10">function from scratch, live</text>

  <line x1="753" y1="248" x2="753" y2="266" stroke="#2a6090" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="636" y="268" width="234" height="76" fill="#0c1e2e" rx="4" stroke="#1e4a6a" stroke-width="1"/>
  <text x="753" y="289" text-anchor="middle" fill="#60b0e0" font-family="sans-serif" font-size="11" font-weight="bold">5-gate validation</text>
  <text x="753" y="310" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">syntax · safety · sanity</text>
  <text x="753" y="328" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="10">determinism · variance</text>

  <line x1="753" y1="344" x2="753" y2="362" stroke="#0090c0" stroke-width="1.5" marker-end="url(#arrc)"/>

  <rect x="636" y="364" width="234" height="76" fill="#061824" rx="4" stroke="#006688" stroke-width="1.5"/>
  <text x="753" y="385" text-anchor="middle" fill="#00c0f0" font-family="sans-serif" font-size="11" font-weight="bold">③ Narrate</text>
  <text x="753" y="406" text-anchor="middle" fill="#3a90b0" font-family="sans-serif" font-size="10">After every move, Claude</text>
  <text x="753" y="424" text-anchor="middle" fill="#3a90b0" font-family="sans-serif" font-size="10">narrates in the personality's voice</text>

  <!-- Column connectors -->
  <line x1="282" y1="260" x2="319" y2="260" stroke="#1a3a50" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <line x1="581" y1="260" x2="618" y2="260" stroke="#1a3a50" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

</svg>
