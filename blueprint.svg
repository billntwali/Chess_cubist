<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <defs>
    <filter id="roughen">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softshadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#e8a030" opacity="0.85"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#50c888" opacity="0.85"/>
    </marker>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#5090e0" opacity="0.85"/>
    </marker>
    <marker id="apur" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#c07aee" opacity="0.85"/>
    </marker>
  </defs>

  <!-- Paper background -->
  <rect width="960" height="560" fill="#1a1a2e" rx="10"/>
  <rect x="6" y="6" width="948" height="548" fill="#16213e" rx="8"/>

  <!-- Subtle texture stripes -->
  <rect x="6" y="6" width="948" height="548" fill="url(#paper)" rx="8" opacity="0.04"/>

  <!-- IMAGE: hand-drawn whiteboard flowchart sketch colorful -->
  <!-- IMAGE: chess engine diagram software architecture -->
  <!-- IMAGE: Claude AI logo anthropic -->

  <!-- Title -->
  <text x="480" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f0e6d0" font-style="italic" opacity="0.9">How we used Claude</text>
  <line x1="160" y1="54" x2="800" y2="54" stroke="#f0e6d0" stroke-width="1" opacity="0.2" filter="url(#roughen)"/>

  <!-- ═══ COLUMN 1: PLANNING ═══ -->

  <!-- Column label -->
  <text x="160" y="84" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#f4a836" font-weight="bold" font-style="italic">Planning</text>
  <line x1="60" y1="90" x2="260" y2="90" stroke="#f4a836" stroke-width="1.5" opacity="0.5" filter="url(#roughen)"/>

  <!-- P1 -->
  <rect x="52" y="100" width="218" height="80" rx="6" fill="#0f2440" stroke="#f4a836" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(-0.4,161,140)"/>
  <text x="161" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#f4c060" font-weight="bold">CLAUDE.md brief</text>
  <text x="161" y="143" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8d0">Hackathon rubric fed</text>
  <text x="161" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8d0">into Claude's context</text>

  <!-- Arrow P1→P2 -->
  <path d="M 161 182 C 158 194 162 200 161 212" stroke="#f4a836" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#ap)" filter="url(#roughen)"/>

  <!-- P2 -->
  <rect x="52" y="214" width="218" height="90" rx="6" fill="#0f2440" stroke="#f4a836" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(0.3,161,259)"/>
  <text x="161" y="238" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#f4c060" font-weight="bold">Plan iteration</text>
  <text x="161" y="257" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8d0">LLM-PLAN1 → PLAN4</text>
  <text x="161" y="274" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8d0">Claude pushes back,</text>
  <text x="161" y="291" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8d0">refines, discards</text>

  <!-- Arrow P2→P3 -->
  <path d="M 161 306 C 159 318 163 324 161 336" stroke="#f4a836" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#ap)" filter="url(#roughen)"/>

  <!-- P3 -->
  <rect x="52" y="338" width="218" height="80" rx="6" fill="#0f2440" stroke="#f4a836" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(-0.2,161,378)"/>
  <text x="161" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#f4c060" font-weight="bold">Claude picks best plan</text>
  <text x="161" y="381" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8d0">All team ideas compared.</text>
  <text x="161" y="398" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8d0">Claude selects + explains.</text>

  <!-- Arrow P3→P4 -->
  <path d="M 161 420 C 158 432 162 438 161 450" stroke="#f4a836" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#ap)" filter="url(#roughen)"/>

  <!-- P4 -->
  <rect x="52" y="452" width="218" height="80" rx="6" fill="#0f2440" stroke="#f4a836" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(0.3,161,492)"/>
  <text x="161" y="476" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#f4c060" font-weight="bold">Per-person Plan Mode</text>
  <text x="161" y="495" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8d0">Each member picks a role.</text>
  <text x="161" y="512" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8d0">Claude writes their spec.</text>

  <!-- ═══ COLUMN 2: BUILDING ═══ -->

  <!-- Column label -->
  <text x="480" y="84" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#50c888" font-weight="bold" font-style="italic">Building</text>
  <line x1="360" y1="90" x2="600" y2="90" stroke="#50c888" stroke-width="1.5" opacity="0.5" filter="url(#roughen)"/>

  <!-- B1 -->
  <rect x="362" y="100" width="236" height="108" rx="6" fill="#0d2218" stroke="#50c888" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(-0.3,480,154)"/>
  <text x="480" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7ae8a8" font-weight="bold">5 parallel Claude agents</text>
  <text x="480" y="143" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#80b898">One per layer</text>
  <!-- chips -->
  <rect x="372" y="152" width="96" height="20" rx="10" fill="#0a3020" stroke="#50c888" stroke-width="1" opacity="0.8"/>
  <text x="420" y="166" text-anchor="middle" font-family="monospace" font-size="9" fill="#50c888">Rust engine</text>
  <rect x="476" y="152" width="112" height="20" rx="10" fill="#0a3020" stroke="#50c888" stroke-width="1" opacity="0.8"/>
  <text x="532" y="166" text-anchor="middle" font-family="monospace" font-size="9" fill="#50c888">Eval generator</text>
  <rect x="372" y="178" width="74" height="20" rx="10" fill="#0a3020" stroke="#50c888" stroke-width="1" opacity="0.8"/>
  <text x="409" y="192" text-anchor="middle" font-family="monospace" font-size="9" fill="#50c888">Backend</text>
  <rect x="454" y="178" width="74" height="20" rx="10" fill="#0a3020" stroke="#50c888" stroke-width="1" opacity="0.8"/>
  <text x="491" y="192" text-anchor="middle" font-family="monospace" font-size="9" fill="#50c888">Frontend</text>
  <rect x="536" y="178" width="56" height="20" rx="10" fill="#0a3020" stroke="#50c888" stroke-width="1" opacity="0.8"/>
  <text x="564" y="192" text-anchor="middle" font-family="monospace" font-size="9" fill="#50c888">Tester</text>

  <!-- Arrow B1→B2 -->
  <path d="M 480 210 C 477 222 482 228 480 240" stroke="#50c888" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#ag)" filter="url(#roughen)"/>

  <!-- B2 -->
  <rect x="362" y="242" width="236" height="90" rx="6" fill="#0d2218" stroke="#50c888" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(0.4,480,287)"/>
  <text x="480" y="266" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7ae8a8" font-weight="bold">Claude writes all the code</text>
  <text x="480" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#80b898">Every file was written</text>
  <text x="480" y="302" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#80b898">and reviewed with Claude.</text>
  <text x="480" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#80b898">Team iterated on output.</text>

  <!-- Arrow B2→B3 -->
  <path d="M 480 334 C 477 346 482 352 480 364" stroke="#50c888" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#ag)" filter="url(#roughen)"/>

  <!-- B3 -->
  <rect x="362" y="366" width="236" height="90" rx="6" fill="#0d2218" stroke="#50c888" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(-0.2,480,411)"/>
  <text x="480" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7ae8a8" font-weight="bold">Interface contract</text>
  <text x="480" y="409" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#80b898">Rust↔Python spec designed</text>
  <text x="480" y="426" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#80b898">with Claude, committed</text>
  <text x="480" y="443" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#80b898">before build started.</text>

  <!-- ═══ COLUMN 3: RUNTIME ═══ -->

  <!-- Column label -->
  <text x="798" y="84" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#c07aee" font-weight="bold" font-style="italic">Runtime</text>
  <line x1="680" y1="90" x2="910" y2="90" stroke="#c07aee" stroke-width="1.5" opacity="0.5" filter="url(#roughen)"/>

  <!-- R1 -->
  <rect x="682" y="100" width="232" height="80" rx="6" fill="#1a0d2e" stroke="#c07aee" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(0.4,798,140)"/>
  <text x="798" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e0a0ff" font-weight="bold">① Interpret</text>
  <text x="798" y="143" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#b080d0">Maps your words into</text>
  <text x="798" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#b080d0">chess concepts</text>

  <!-- Arrow R1→R2 -->
  <path d="M 798 182 C 795 194 800 200 798 212" stroke="#c07aee" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#apur)" filter="url(#roughen)"/>

  <!-- R2 -->
  <rect x="682" y="214" width="232" height="80" rx="6" fill="#1a0d2e" stroke="#c07aee" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(-0.3,798,254)"/>
  <text x="798" y="238" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e0a0ff" font-weight="bold">② Generate</text>
  <text x="798" y="257" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#b080d0">Writes evaluate(board)</text>
  <text x="798" y="274" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#b080d0">live, from scratch</text>

  <!-- Arrow R2→R3 -->
  <path d="M 798 296 C 795 308 800 314 798 326" stroke="#c07aee" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#apur)" filter="url(#roughen)"/>

  <!-- R3 — validation, slightly muted -->
  <rect x="682" y="328" width="232" height="72" rx="6" fill="#131828" stroke="#5090e0" stroke-width="1.5" opacity="0.9" filter="url(#softshadow)" transform="rotate(0.2,798,364)"/>
  <text x="798" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#80b0e8" font-weight="bold">5-gate validation</text>
  <text x="798" y="369" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6080b0">syntax · safety · sanity</text>
  <text x="798" y="386" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6080b0">determinism · variance</text>

  <!-- Arrow R3→R4 -->
  <path d="M 798 402 C 795 414 800 420 798 432" stroke="#c07aee" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#apur)" filter="url(#roughen)"/>

  <!-- R4 -->
  <rect x="682" y="434" width="232" height="80" rx="6" fill="#1a0d2e" stroke="#c07aee" stroke-width="1.8" opacity="0.95" filter="url(#softshadow)" transform="rotate(-0.3,798,474)"/>
  <text x="798" y="458" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e0a0ff" font-weight="bold">③ Narrate</text>
  <text x="798" y="474" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#b080d0">After every move, Claude narrates</text>
  <text x="798" y="491" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#b080d0">in the personality's voice</text>

  <!-- Column connector arrows -->
  <path d="M 274 300 C 300 296 330 302 360 300" stroke="#50c888" stroke-width="1.2" fill="none" opacity="0.4" stroke-dasharray="5 3" marker-end="url(#ag)"/>
  <path d="M 600 300 C 626 296 656 302 680 300" stroke="#c07aee" stroke-width="1.2" fill="none" opacity="0.4" stroke-dasharray="5 3" marker-end="url(#apur)"/>

</svg>
